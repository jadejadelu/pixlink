version: '3.8'

services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: pixlink-mysql
    restart: unless-stopped
    environment:
      # MySQL root用户密码
      MYSQL_ROOT_PASSWORD: password
      # 创建的数据库名称
      MYSQL_DATABASE: pixlink
      # MySQL时区
      TZ: Asia/Shanghai
    ports:
      # MySQL服务端口
      - "3306:3306"
    volumes:
      # MySQL数据持久化
      - mysql_data:/var/lib/mysql
    networks:
      - pixlink-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PixLink服务端
  pixlink-server:
    build:
      context: ./pixlink-server
      dockerfile: Dockerfile
    container_name: pixlink-server
    restart: unless-stopped
    environment:
      # ========== 服务器配置 ==========
      # 服务器端口（默认：3000）
      PORT: 3000
      # 运行环境（默认：development）
      NODE_ENV: development
      # Debug模式（跳过邮件验证）
      DEBUG_MODE: true

      # ========== 数据库配置 ==========
      # 数据库连接地址（使用服务名mysql作为hostname）
      DATABASE_URL: "mysql://root:password@mysql:3306/pixlink"

      # ========== JWT配置 ==========
      # JWT密钥（生产环境请修改为随机字符串）
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      # JWT过期时间（默认：7d）
      JWT_EXPIRES_IN: 7d



      # ========== Token配置 ==========
      # 注册令牌TTL秒数（默认：300）
      ENROLLMENT_TOKEN_TTL: 300
      # 激活令牌TTL秒数（默认：180 = 3分钟）
      ACTIVATION_TOKEN_TTL: 180

      # ========== 邮件服务配置 ==========
      # SMTP服务器地址（请修改为实际的SMTP服务器）
      SMTP_HOST: smtp.gmail.com
      # SMTP端口（默认：587，Gmail建议使用465）
      SMTP_PORT: 465
      # SMTP用户名（请修改为实际的邮箱地址）
      SMTP_USER: your-email@gmail.com
      # SMTP密码（请修改为实际的邮箱密码或应用专用密码）
      SMTP_PASS: your-email-password

      # ========== 前端URL配置 ==========
      # 前端URL（用于激活链接）
      FRONTEND_URL: http://localhost:5173

      # ========== ZTM配置 ==========
      # ZTM hub地址（用于bootstrap）
      ZTM_HUB_ADDRESS: ztm-hub:8888
      # ZTM root agent地址（用于创建permit）
      ZTM_ROOT_AGENT_URL: http://ztm-agent:7777
      # ZTM mesh名称
      ZTM_MESH_NAME: ztm-hub:8888
    ports:
      # 服务端API端口
      - "3000:3000"

    depends_on:
      - mysql
      - ztm-agent
    networks:
      - pixlink-network
    command: npm run dev

  # PixLink客户端1
  pixlink-client-1:
    build:
      context: ./pixlink-client
      dockerfile: Dockerfile
    container_name: pixlink-client-1
    restart: unless-stopped
    environment:
      # ========== Vite开发服务器配置 ==========
      # 开发服务器端口（默认：5173）
      VITE_DEV_PORT: 5173
      # 开发服务器主机（默认：localhost）
      VITE_DEV_HOST: 0.0.0.0

      # ========== ZTM Agent配置 ==========
      # 本地ZTM agent地址（用于获取identity和创建tunnel）
      VITE_ZTM_LOCAL_AGENT_URL: http://ztm-client1-agent:7777/
      # ZTM mesh名称
      VITE_ZTM_MESH_NAME: mesh

      # ========== 服务器API配置 ==========
      # 后端API地址
      VITE_API_BASE_URL: http://pixlink-server:3000
    ports:
      # 客户端开发服务器端口
      - "5173:5173"
    depends_on:
      - pixlink-server
      - ztm-client1-agent
    networks:
      - pixlink-network
    command: npm run dev

  # PixLink客户端2
  pixlink-client-2:
    build:
      context: ./pixlink-client
      dockerfile: Dockerfile
    container_name: pixlink-client-2
    restart: unless-stopped
    environment:
      # ========== Vite开发服务器配置 ==========
      # 开发服务器端口
      VITE_DEV_PORT: 5174
      # 开发服务器主机
      VITE_DEV_HOST: 0.0.0.0

      # ========== ZTM Agent配置 ==========
      # 本地ZTM agent地址（用于获取identity和创建tunnel）
      VITE_ZTM_LOCAL_AGENT_URL: http://ztm-client2-agent:7777/
      # ZTM mesh名称
      VITE_ZTM_MESH_NAME: mesh

      # ========== 服务器API配置 ==========
      # 后端API地址
      VITE_API_BASE_URL: http://pixlink-server:3000
    ports:
      # 客户端开发服务器端口
      - "5174:5174"
    depends_on:
      - pixlink-server
      - ztm-client2-agent
    networks:
      - pixlink-network
    command: npm run dev

  # ZTM Hub服务
  ztm-hub:
    image: flomesh/ztm-hub:1.0.0-rc2
    container_name: ztm-hub
    ports:
      - "8888:8888"
    environment:
      - ZTM_NAMES=ztm-hub
      - ZTM_PORT=8888
      - ZTM_DATA=/home/ztm/.ztm
    volumes:
      - ./pixlink-demo-ztm/hub-data:/home/ztm/.ztm
      - shared-permit:/permit
    networks:
      - pixlink-network
    restart: unless-stopped

  # ZTM Root Agent服务
  ztm-agent:
    image: flomesh/ztm-agent:1.0.0-rc2
    container_name: ztm-agent
    ports:
      - "7777:7777"
    environment:
      - ZTM_JOIN_MESH=ztm-hub:8888
      - ZTM_ENDPOINT=agent
      - ZTM_PORT=7777
      - ZTM_PERMIT=/permit
      - ZTM_DATA=/home/ztm/.ztm
    volumes:
      - ./pixlink-demo-ztm/agent-data:/home/ztm/.ztm
      - shared-permit:/permit
      - ./pixlink-demo-ztm/wait-and-run-agent.sh:/usr/local/bin/wait-and-run-agent.sh:ro
    networks:
      - pixlink-network
    depends_on:
      - ztm-hub
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/wait-and-run-agent.sh"]

  # ZTM Client1 Agent服务
  ztm-client1-agent:
    image: flomesh/ztm-agent:1.0.0-rc2
    container_name: ztm-client1-agent
    entrypoint: ["/bin/sh", "-c", "ztm run agent --listen 0.0.0.0:7777"]
    ports:
      - "7778:7777"
    environment:
      - ZTM_JOIN_MESH=ztm-hub:8888
      - ZTM_ENDPOINT=agent
      - ZTM_PORT=7777
      - ZTM_PERMIT=/permit
      - ZTM_DATA=/home/ztm/.ztm
    volumes:
      - ./pixlink-demo-ztm/client1-agent-data:/home/ztm/.ztm
      - ./pixlink-demo-ztm/client1-permit:/permit
    networks:
      - pixlink-network
    depends_on:
      - ztm-hub
    restart: unless-stopped

  # ZTM Client2 Agent服务
  ztm-client2-agent:
    image: flomesh/ztm-agent:1.0.0-rc2
    container_name: ztm-client2-agent
    entrypoint: ["/bin/sh", "-c", "ztm run agent --listen 0.0.0.0:7777"]
    ports:
      - "7779:7777"
    environment:
      - ZTM_JOIN_MESH=ztm-hub:8888
      - ZTM_ENDPOINT=agent
      - ZTM_PORT=7777
      - ZTM_PERMIT=/permit
      - ZTM_DATA=/home/ztm/.ztm
    volumes:
      - ./pixlink-demo-ztm/client2-agent-data:/home/ztm/.ztm
      - ./pixlink-demo-ztm/client2-permit:/permit
    networks:
      - pixlink-network
    depends_on:
      - ztm-hub
    restart: unless-stopped

volumes:
  mysql_data:
  shared-permit:

networks:
  pixlink-network:
    driver: bridge